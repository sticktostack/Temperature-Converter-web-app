<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Temperature Converter</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="container">
    <h2>Temperature Converter</h2>

    <div class="row">
      <input type="number" id="input1" placeholder="Enter value">
      <select id="unit1">
        <option value="C">Celsius</option>
        <option value="F">Fahrenheit</option>
        <option value="K">Kelvin</option>
      </select>
    </div>

    <div class="row">
      <input type="number" id="input2" placeholder="Converted value">
      <select id="unit2">
        <option value="F">Fahrenheit</option>
        <option value="C">Celsius</option>
        <option value="K">Kelvin</option>
      </select>
    </div>

  </div>
  <div class="details-box">
  <h3>Project Highlights</h3>
  <ul>
    <li>🌡 Real-time temperature conversion</li>
    <li>🔁 Dual editable inputs</li>
    <li>⚡ Auto update while typing</li>
    <li>🎯 Supports Celsius, Fahrenheit & Kelvin</li>
    <li>🎨 Dynamic color change</li>
    <li>✨ Smooth number transition effect</li>
    
  </ul>
</div>
  <script src="scipt.js"></script>
</body>

</html>
